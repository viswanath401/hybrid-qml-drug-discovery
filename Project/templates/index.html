<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Quantum Drug Discovery</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1f2937, #3b82f6);
            color: white;
            text-align: center;
            padding: 40px;
        }

        h1 {
            font-size: 40px;
            margin-bottom: 10px;
        }

        p {
            color: #d1d5db;
        }

        .container {
            background: white;
            color: black;
            padding: 30px;
            border-radius: 15px;
            width: 400px;
            margin: auto;
            margin-top: 30px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.2);
        }

        input {
            width: 90%;
            padding: 12px;
            margin-top: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            margin-top: 15px;
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            background: #3b82f6;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #2563eb;
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            background: #f3f4f6;
            border-radius: 10px;
        }

        .toxic {
            color: red;
            font-weight: bold;
        }

        .safe {
            color: green;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <h1>Quantum Drug Discovery</h1>
    <p>Predict molecular toxicity using AI</p>

    <div class="container">
        <form method="POST">
            <input type="text" name="smiles" placeholder="Enter SMILES (e.g. CCO)" required>
            <br>
            <button type="submit">Predict</button>
        </form>

        {% if result %}
        <div class="result">
            <h3 class="{{ 'toxic' if result.prediction == 'Toxic' else 'safe' }}">
                {{ result.prediction }}
            </h3>

            <p><strong>Probability:</strong> {{ result.probability }}</p>
            <p><strong>Molecular Formula:</strong> {{ result.formula }}</p>
            <p><strong>Compound Name:</strong> {{ result.name }}</p>
        </div>
        {% endif %}
    </div>

</body>
</html>
